<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidCare - 儿童习惯养成助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            color: white;
            padding: 2rem;
        }
        .logo {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 24px;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: #6366f1;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .subtitle {
            font-size: 1.5rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            max-width: 800px;
            margin: 3rem auto;
        }
        .feature {
            background: rgba(255,255,255,0.15);
            padding: 1.5rem;
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        .feature-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .feature-title {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .feature-desc {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 0.5rem;
        }
        .coming-soon {
            margin-top: 3rem;
            padding: 1rem 2rem;
            background: rgba(255,255,255,0.2);
            border-radius: 50px;
            display: inline-block;
        }
        footer {
            position: fixed;
            bottom: 1rem;
            width: 100%;
            text-align: center;
            opacity: 0.7;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">KC</div>
        <h1>KidCare</h1>
        <p class="subtitle">儿童习惯养成智能助手</p>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">📚</div>
                <div class="feature-title">作业管理</div>
                <div class="feature-desc">高效完成学习任务</div>
            </div>
            <div class="feature">
                <div class="feature-icon">✨</div>
                <div class="feature-title">习惯打卡</div>
                <div class="feature-desc">培养自律好习惯</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⏱️</div>
                <div class="feature-title">屏幕时间</div>
                <div class="feature-desc">健康使用电子设备</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🎁</div>
                <div class="feature-title">奖励系统</div>
                <div class="feature-desc">积分激励增强成就感</div>
            </div>
        </div>
        
        <div class="coming-soon">
            🚀 Android App 即将上线
        </div>
    </div>
    
    <footer>
        © 2026 KidCare. All rights reserved.<br>
        如有问题，请联系：<a href="mailto:dwgph1026@163.com">dwgph1026@163.com</a>
    </footer>
</body>
</html>
